<!-- Hoststar-Reset: hide builder wrappers -->
<style data-hoststar-reset>
/* Hoststar-Override: blendet nur Builder-eigene Top-Level-Wrapper aus.
   Wird nur im Produktions-Head-Inject eingebunden (build-inject.js), nicht im Dev.
   VORSICHT: Zu aggressive Selektoren killen unsere eigenen Elemente —
   wir scopen auf direkte Body-Kinder (Hoststar's own chrome). */

/* Builder-Chrome ausblenden · nur DIREKTE Body-Kinder,
   damit unsere eigenen <header>, <nav>, <footer> innerhalb <section>/<main> unberührt bleiben */
body > header,
body > footer,
body > nav {
  display: none !important;
}

/* Hoststar-typische Builder-Wrapper · nur als direkte Body-Kinder */
body > [id*="hoststar"],
body > [class*="hoststar"],
body > [id*="builder"],
body > [class*="builder"] {
  display: none !important;
}

/* Default-Abstände auf Body/Main entfernen */
body,
main,
#main,
.page,
.site,
#wrapper,
#content {
  margin-top: 0 !important;
  padding-top: 0 !important;
  margin-bottom: 0 !important;
  padding-bottom: 0 !important;
}

</style>
